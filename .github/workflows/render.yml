name: Render portfolio assets

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/render.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pillow matplotlib pyyaml

      - name: Run the pipeline
        run: python scripts/python/run_all.py

      - name: Sync posters into /docs
        run: |
          mkdir -p docs/assets
          cp assets/renders/*.png docs/assets/

      - name: Commit regenerated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets assets/renders scripts/projects || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "ci: regenerate engine projects and posters"
            git push
          fi
